server {
    listen 80;
    server_name _;

    # Gate the whole site (including the ngrok-exposed URL) behind basic auth.
    auth_basic "Sandstone Wall Builder";
    auth_basic_user_file /etc/nginx/.htpasswd;

    root /usr/share/nginx/html;
    index index.html;

    # API goes to the FastAPI backend on the compose network.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;
        # Solving a full wall can take a couple of minutes.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
